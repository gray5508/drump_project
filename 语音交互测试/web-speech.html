<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Web Speech · 鼓谱语音测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-engine="web-speech">
  <header class="topbar">
    <a class="back-link" href="index.html">← 两个版本</a>
    <div class="brand"><span>谱面练习台</span><small>Web Speech API</small></div>
    <div class="engine-pill local">浏览器识别</div>
  </header>
  <main class="practice-shell">
    <section class="voice-panel">
      <div class="voice-copy">
        <p class="section-kicker">VOICE CONTROL</p>
        <h1>按行练习</h1>
        <p id="engineHint">点击开始后持续监听，先说“麦当劳”，再说练习指令。</p>
      </div>
      <button class="listen-button" id="listenButton" type="button"><span class="mic-dot"></span><span id="listenLabel">开始监听</span></button>
      <div class="heard-box" aria-live="polite">
        <div class="wake-status" id="wakeStatus"><i></i><div><b id="wakeLabel">等待“麦当劳”</b><small id="wakeCountdown">说“麦当劳”后开放 15 秒</small></div></div>
        <span>识别内容</span>
        <strong id="transcript">等待开始…</strong>
      </div>
    </section>
    <section class="score-panel">
      <div class="score-toolbar">
        <button id="prevButton" type="button" aria-label="上一页">←</button>
        <div><strong id="lineTitle">第 1 行</strong><span id="measureRange"></span></div>
        <button id="nextButton" type="button" aria-label="下一页">→</button>
      </div>
      <div class="paper-wrap"><div id="scoreStrip" class="score-strip"></div></div>
      <div class="page-dots" id="pageDots" aria-label="行分页"></div>
    </section>
    <aside class="command-panel">
      <div><span>先说“麦当劳”唤醒</span><strong>下一行 / 下一页</strong><strong>上一行 / 上一页</strong><strong>第 xx 小节</strong></div>
      <p id="statusText">尚未启动语音识别</p>
    </aside>
  </main>
  <script src="measures.js"></script>
  <script src="common.js?v=20260716-mcdonalds-reset"></script>
  <script src="web-speech.js?v=20260716-mcdonalds-reset"></script>
</body>
</html>
